<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Derek Joel George's creative library — photography, video, design, and writing.">
  <link rel="icon" href="images/logo-orange.png" type="image/png">
  <title>Creative Library — Derek Joel George</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/case-studies.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/creative-library.css">
  <link rel="stylesheet" href="css/library-mobile.css">
</head>
<body class="case-page library-page">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div class="page">
    <header class="site-header" aria-label="Site header">
      <a href="index.html" class="site-header__brand" aria-label="Home">
        <img src="images/logo-orange.png" alt="" class="site-header__logo" width="38" height="30">
      </a>
      <nav class="site-header__social" aria-label="Social links">
        <a href="https://www.linkedin.com/" class="social-link" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" data-tooltip="stalk me on Linkedin">
          <i class="fab fa-linkedin-in" aria-hidden="true"></i>
        </a>
        <a href="#" class="social-link social-link--email" aria-label="Email" data-tooltip="send me an email">
          <i class="far fa-envelope" aria-hidden="true"></i>
        </a>
        <a href="#" class="social-link social-link--resume" aria-label="Resume" data-tooltip="View my resume">
          <i class="far fa-file-lines" aria-hidden="true"></i>
        </a>
      </nav>
    </header>

    <main id="main-content" class="case-page__main">
      <h1 class="page-title">My Creative Library</h1>
      <p class="page-intro">A collection of my creative work.</p>

      <div class="library-container" id="libraryContainer">
        <div class="folders-grid" id="foldersGrid" aria-label="Category folders"></div>
        <p class="library-loading" id="libraryLoading">Loading categories…</p>
        <p class="library-empty" id="libraryEmpty" hidden>No categories yet.</p>
      </div>

      <div class="library-category-view" id="libraryCategoryView" hidden>
        <div class="library-category-view__inner" id="libraryCategoryInner"></div>
      </div>
    </main>
  </div>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    <a href="index.html" class="mobile-nav__link" aria-label="Home">
      <i class="fa-solid fa-house" aria-hidden="true"></i>
      <span class="mobile-nav__label">Home</span>
    </a>
    <a href="case-studies.html" class="mobile-nav__link" aria-label="Work">
      <i class="fa-solid fa-briefcase" aria-hidden="true"></i>
      <span class="mobile-nav__label">Work</span>
    </a>
    <a href="creative-library.html" class="mobile-nav__link mobile-nav__link--active" aria-current="page" aria-label="Studio">
      <i class="fa-solid fa-palette" aria-hidden="true"></i>
      <span class="mobile-nav__label">Studio</span>
    </a>
    <a href="experiments.html" class="mobile-nav__link" aria-label="Experiments">
      <i class="fa-solid fa-flask" aria-hidden="true"></i>
      <span class="mobile-nav__label">Experiments</span>
    </a>
  </nav>

  <script src="js/social-links.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-dev-data.js"></script>
  <script src="js/supabase-cache.js"></script>
  <script src="js/supabase-storage.js"></script>
  <script src="js/creative-library.js"></script>
  <script src="js/library-mobile-page.js"></script>
  <script src="js/resume-modal.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
